apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier
  labels:
    role: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: frontend
        image:  devline.azurecr.io/perseverance-project:VERSION
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
            ephemeral-storage: "512Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
            ephemeral-storage: "1Gi"
        ports:
        - containerPort: 3000
      imagePullSecrets:
      - name: acr-creds
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: three-tier
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    role: frontend
  type: LoadBalancer
